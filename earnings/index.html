<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=2026Q1/themes.html">
  <title>1Q26 Earnings Themes</title>
  <style>
    :root {
      --ink: #14211f;
      --muted: #5b6763;
      --line: #d9e0dd;
      --paper: #fffdf8;
      --soft: #f2f6f3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.45;
    }
    main { max-width: 760px; margin: 0 auto; padding: 28px 20px 44px; }
    h1 { margin: 0 0 8px; font-size: clamp(1.8rem, 3vw, 2.4rem); line-height: 1.02; }
    p { margin: 0 0 14px; color: var(--muted); }
    a {
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 10px;
      font-weight: 650;
      background: var(--soft);
    }
    a:hover { border-color: var(--ink); }
    footer { margin-top: 20px; color: var(--muted); font-size: .86rem; }
  </style>
</head>
<body>
<main>
  <h1>1Q26 Earnings Themes</h1>
  <p>Opening the most recent configured quarter.</p>
  <p><a href="2026Q1/themes.html">Open 1Q26 earnings themes</a></p>
  <script>window.location.replace("2026Q1/themes.html");</script>
</main>
</body>
</html>
