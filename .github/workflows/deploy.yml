name: Deploy to GitHub Pages (encrypted)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Encrypt HTML files
        env:
          STATICRYPT_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          find . -name '*.html' \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -name 'password_template.html' | while read f; do
            dir=$(dirname "$f")
            staticrypt "$f" -d "$dir" \
              --short \
              --salt "${{ secrets.STATICRYPT_SALT }}" \
              --remember 30 \
              -t password_template.html \
              --template-instructions "Enter the password to access this site." \
              --template-button "Unlock"
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
