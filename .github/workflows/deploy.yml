name: Deploy to GitHub Pages (encrypted)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue overlapping deploys instead of cancelling them into "failed" runs
# (cancel-in-progress: true was a source of spurious failure emails when
# pushes/re-runs stacked up). Never cancel an in-progress Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Report the URL from whichever deploy attempt succeeded.
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Encrypt HTML files
        env:
          STATICRYPT_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          find . -name '*.html' \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -name 'password_template.html' | while read f; do
            dir=$(dirname "$f")
            staticrypt "$f" -d "$dir" \
              --short \
              --salt "${{ secrets.STATICRYPT_SALT }}" \
              --remember 30 \
              -t password_template.html \
              --template-instructions "Enter the password to access this site." \
              --template-button "Unlock"
          done

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      # actions/deploy-pages intermittently returns "Deployment failed, try again
      # later" (a transient GitHub Pages API failure). Retry up to 3x within the
      # run so a flaky attempt self-heals instead of failing the run and emailing.
      # continue-on-error keeps earlier attempts from failing the job; the final
      # attempt (no continue-on-error) decides the run outcome.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Pause before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Pause before final retry
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (final attempt)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5
