        .staticrypt-toggle-password-visibility {

            top: 50%;

            opacity: 0.5;
            padding: 4px;
            height: 20px;
            width: 20px;
            transition: opacity 0.2s;

            font-family: inherit;

            letter-spacing: 0.02em;

        .staticrypt-decrypt-button:hover { background: #1d4ed8; }
        .staticrypt-decrypt-button:active { background: #1e40af; }
        label.staticrypt-remember {

            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 0.85em;
            color: #64748b;
            cursor: pointer;

        .staticrypt-remember input[type="checkbox"] {

            width: 16px;
            height: 16px;
